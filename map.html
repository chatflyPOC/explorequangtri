<!-- ── Map Layout ── -->
<div class="map-layout">
  <!-- Sidebar -->
  <div class="map-sidebar">
    <div class="map-sidebar-header">
      <div class="sidebar-search">
        <i class="fas fa-search si-icon"></i>
        <input type="text" id="sidebarSearch" placeholder="Tìm địa điểm...">
      </div>
      <div class="map-cat-filters" id="mapCatFilters">
        <button class="map-cat-btn active" data-cat="all">Tất cả</button>
        <button class="map-cat-btn" data-cat="history">🏛️ Lịch sử</button>
        <button class="map-cat-btn" data-cat="beach">🏖️ Biển</button>
        <button class="map-cat-btn" data-cat="nature">🌿 Thiên nhiên</button>
        <button class="map-cat-btn" data-cat="religion">⛩️ Tâm linh</button>
      </div>
      <div class="map-count" id="mapCount">Hiển thị tất cả địa điểm</div>
    </div>
    <div class="map-sidebar-list" id="sidebarList">
      <!-- Filled by JS -->
    </div>
  </div>

  <!-- Map Container -->
  <div class="map-container">
    <div id="map"></div>

    <!-- Info Panel -->
    <div class="map-info-panel" id="infoPanel">
      <button class="map-info-close" onclick="closeInfoPanel()">✕</button>
      <div class="map-info-img" id="infoPanelImg">📍</div>
      <div class="map-info-body">
        <div class="map-info-title" id="infoPanelTitle"></div>
        <div class="map-info-meta" id="infoPanelMeta"></div>
        <div class="rating" id="infoPanelRating" style="margin-bottom:10px;"></div>
        <p id="infoPanelDesc" style="font-size:.83rem;color:var(--text-muted);line-height:1.6;margin-bottom:12px;"></p>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="showFullDetail()">
            <i class="fas fa-info-circle"></i> Chi tiết
          </button>
          <a id="infoPanelDirections" href="#" class="btn btn-outline btn-sm" target="_blank">
            <i class="fas fa-directions"></i> Chỉ đường
          </a>
        </div>
      </div>
    </div>

    <!-- Legend -->
    <div id="mapLegend" style="position:absolute;bottom:20px;left:20px;z-index:800;background:rgba(255,255,255,.95);border-radius:var(--radius-sm);padding:12px 14px;box-shadow:var(--shadow-md);font-size:.78rem;">
      <div style="font-weight:700;margin-bottom:8px;">Chú giải</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <div style="display:flex;align-items:center;gap:7px;"><span style="width:12px;height:12px;border-radius:50%;background:#c0392b;display:inline-block;"></span> Di tích Lịch sử</div>
        <div style="display:flex;align-items:center;gap:7px;"><span style="width:12px;height:12px;border-radius:50%;background:#2980b9;display:inline-block;"></span> Biển & Đảo</div>
        <div style="display:flex;align-items:center;gap:7px;"><span style="width:12px;height:12px;border-radius:50%;background:#27ae60;display:inline-block;"></span> Thiên nhiên</div>
        <div style="display:flex;align-items:center;gap:7px;"><span style="width:12px;height:12px;border-radius:50%;background:#8e44ad;display:inline-block;"></span> Tâm linh</div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="destModal" onclick="closeModal(event)">

      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
