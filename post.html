/* ════════════════════════════════════════════════════════
   POST PAGE — blog article detail
   ════════════════════════════════════════════════════════ */

/* ── Hero ── */
.post-hero {
  position: relative; height: 520px; overflow: hidden;
  background: #0d1b0a;
}
.post-hero-img {
  width: 100%; height: 100%; object-fit: cover;
  filter: brightness(.55);
  transition: transform 8s ease-out;
}
.post-hero:hover .post-hero-img { transform: scale(1.04); }
.post-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.3) 55%, transparent 100%);
  display: flex; align-items: flex-end;
}
.post-hero-body {
  max-width: 860px; margin: 0 auto; width: 100%;
  padding: 0 clamp(20px,5vw,48px) 44px;
}
.post-type-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--c-primary); color: #fff;
  padding: 4px 14px; border-radius: 100px;
  font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
  margin-bottom: 16px;
}
.post-hero-title {
  font-size: clamp(1.625rem, 3.5vw, 2.75rem);
  font-weight: 900; color: #fff; line-height: 1.2; margin-bottom: 18px;
  text-shadow: 0 2px 20px rgba(0,0,0,.4);
}
.post-hero-meta {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  color: rgba(255,255,255,.8); font-size: .82rem;
}
.post-hero-meta .av {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--c-primary), var(--c-primary-light));
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 800; color: #fff; flex-shrink: 0;
}
.post-hero-meta .meta-sep { opacity: .4; }
.post-hero-meta .meta-stars { color: #f5c842; letter-spacing: 1px; font-size: .8rem; }

/* ── Breadcrumb ── */
.post-breadcrumb {
  background: var(--c-bg); border-bottom: 1px solid var(--c-border);
  padding: 12px 0;
}
.post-breadcrumb-inner {
  max-width: 1140px; margin: 0 auto; padding: 0 clamp(20px,5vw,48px);
  display: flex; align-items: center; gap: 8px;
  font-size: .8rem; color: var(--c-muted);
}
.post-breadcrumb-inner a { color: var(--c-primary); font-weight: 600; }
.post-breadcrumb-inner a:hover { text-decoration: underline; }
.post-breadcrumb-inner i { font-size: .65rem; opacity: .55; }

/* ── Layout ── */
.post-layout {
  max-width: 1140px; margin: 0 auto;
  padding: 48px clamp(20px,5vw,48px) 80px;
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 48px;
  align-items: start;
}

/* ── Article ── */
.post-article { min-width: 0; }

/* Lead paragraph */
.post-lead {
  font-size: 1.125rem; color: var(--c-text);
  line-height: 1.82; margin-bottom: 32px;
  font-weight: 400;
  border-left: 4px solid var(--c-primary);
  padding-left: 20px;
}

/* Body typography */
.post-body { color: var(--c-text-2); font-size: 1rem; line-height: 1.85; }
.post-body p { margin-bottom: 20px; }
.post-body h2 {
  font-size: 1.375rem; font-weight: 800; color: var(--c-text);
  margin: 40px 0 16px; padding-top: 8px;
  border-top: 2px solid var(--c-border);
}
.post-body h3 {
  font-size: 1.1rem; font-weight: 700; color: var(--c-text);
  margin: 28px 0 12px;
}
.post-body ul { padding-left: 22px; margin-bottom: 20px; }
.post-body li { margin-bottom: 8px; }
.post-body strong { color: var(--c-text); font-weight: 700; }
.post-body em { font-style: italic; color: var(--c-text); }

/* Pull quote */
.post-quote {
  margin: 32px 0; padding: 24px 28px;
  background: var(--c-primary-faint); border-left: 5px solid var(--c-primary);
  border-radius: 0 12px 12px 0;
}
.post-quote p {
  font-size: 1.0625rem; font-style: italic; font-weight: 600;
  color: var(--c-primary-dark); margin: 0; line-height: 1.7;
}

/* Info box */
.post-infobox {
  margin: 32px 0; background: var(--c-surface);
  border: 1.5px solid var(--c-border); border-radius: 16px;
  overflow: hidden;
}
.post-infobox-head {
  background: var(--c-primary); color: #fff;
  padding: 12px 20px; font-weight: 700; font-size: .875rem;
  display: flex; align-items: center; gap: 8px;
}
.post-infobox-body { padding: 16px 20px; }
.post-infobox-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 8px 0; border-bottom: 1px solid var(--c-border-2);
  font-size: .875rem;
}
.post-infobox-row:last-child { border-bottom: none; }
.post-infobox-row .pir-label {
  color: var(--c-muted); font-weight: 600; min-width: 120px; flex-shrink: 0;
}
.post-infobox-row .pir-val { color: var(--c-text); }

/* Tip box */
.post-tip {
  margin: 28px 0; padding: 18px 20px;
  background: rgba(245,166,35,.08); border: 1.5px solid rgba(245,166,35,.25);
  border-radius: 12px; display: flex; gap: 14px;
}
.post-tip-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
.post-tip-body { font-size: .875rem; line-height: 1.7; color: var(--c-text-2); }
.post-tip-body strong { color: var(--c-text); }

/* Rating */
.post-rating {
  margin: 40px 0 32px; padding: 24px;
  background: var(--c-surface); border: 1.5px solid var(--c-border);
  border-radius: 16px;
}
.post-rating-head {
  display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
}
.post-rating-score {
  font-size: 2.5rem; font-weight: 900; color: var(--c-primary); line-height: 1;
}
.post-rating-stars { color: #f5c842; font-size: 1.25rem; letter-spacing: 2px; }
.post-rating-count { font-size: .8rem; color: var(--c-muted); margin-top: 4px; }
.post-rating-breakdown { display: flex; flex-direction: column; gap: 10px; }
.prb-row { display: flex; align-items: center; gap: 12px; font-size: .82rem; }
.prb-label { color: var(--c-muted); min-width: 120px; }
.prb-track {
  flex: 1; height: 6px; background: var(--c-border-2); border-radius: 3px; overflow: hidden;
}
.prb-fill { height: 100%; background: var(--c-primary); border-radius: 3px; }
.prb-val { font-weight: 700; color: var(--c-text); min-width: 28px; text-align: right; }

/* Tags */
.post-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 36px; }
.post-tag {
  padding: 5px 14px; border-radius: 100px;
  background: var(--c-bg); border: 1.5px solid var(--c-border);
  font-size: .78rem; font-weight: 600; color: var(--c-muted);
}
.post-tag:hover { border-color: var(--c-primary); color: var(--c-primary); cursor: pointer; }

/* Author card */
.post-author {
  margin: 40px 0; padding: 24px;
  background: var(--c-surface); border: 1.5px solid var(--c-border);
  border-radius: 16px; display: flex; gap: 20px; align-items: flex-start;
}
.post-author-av {
  width: 60px; height: 60px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--c-primary), var(--c-primary-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem; font-weight: 900; color: #fff;
}
.post-author-name { font-size: 1rem; font-weight: 800; margin-bottom: 4px; }
.post-author-bio { font-size: .85rem; color: var(--c-muted); line-height: 1.6; }
.post-author-posts { font-size: .78rem; color: var(--c-primary); font-weight: 600; margin-top: 6px; }

/* Nav buttons */
.post-nav {
  display: flex; justify-content: space-between; gap: 12px;
  margin: 40px 0; flex-wrap: wrap;
}
.post-nav .btn { gap: 8px; }

/* ── Sidebar ── */
.post-sidebar { position: sticky; top: 84px; }

.post-toc {
  background: var(--c-surface); border: 1.5px solid var(--c-border);
  border-radius: 16px; padding: 20px; margin-bottom: 20px;
}
.post-toc-title {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--c-muted); margin-bottom: 12px;
}
.post-toc-list { list-style: none; }
.post-toc-list li { margin-bottom: 2px; }
.post-toc-list a {
  display: block; padding: 6px 10px;
  font-size: .82rem; color: var(--c-text-2);
  border-radius: 8px; border-left: 3px solid transparent;
  transition: all .18s; line-height: 1.45;
}
.post-toc-list a:hover { color: var(--c-primary); background: var(--c-primary-faint); border-left-color: var(--c-primary); }
.post-toc-list a.active { color: var(--c-primary); background: var(--c-primary-faint); border-left-color: var(--c-primary); font-weight: 600; }

/* Share widget */
.post-share {
  background: var(--c-surface); border: 1.5px solid var(--c-border);
  border-radius: 16px; padding: 18px 20px; margin-bottom: 20px;
}
.post-share-title {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--c-muted); margin-bottom: 12px;
}
.post-share-btns { display: flex; flex-direction: column; gap: 8px; }
.post-share-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-radius: 10px; border: 1.5px solid var(--c-border);
  font-size: .82rem; font-weight: 600; cursor: pointer;
  background: var(--c-bg); color: var(--c-text-2);
  transition: all .18s; text-decoration: none;
}
.post-share-btn:hover { border-color: var(--c-primary); color: var(--c-primary); background: var(--c-primary-faint); }
.post-share-btn i { width: 16px; text-align: center; }

/* Destination card in sidebar */
.post-dest-card {
  background: var(--c-surface); border: 1.5px solid var(--c-border);
  border-radius: 16px; overflow: hidden;
}
.post-dest-card-bg {
  height: 100px;
  background: linear-gradient(135deg, var(--c-primary-dark), var(--c-primary));
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem;
}
.post-dest-card-body { padding: 16px; }
.post-dest-card-name { font-weight: 800; font-size: .95rem; margin-bottom: 4px; }
.post-dest-card-addr { font-size: .78rem; color: var(--c-muted); margin-bottom: 12px; }

/* ── Related posts ── */
.post-related { background: var(--c-bg); padding: 56px 0; margin-top: 48px; }
.post-related-inner { max-width: 1140px; margin: 0 auto; padding: 0 clamp(20px,5vw,48px); }
.post-related-head {
  display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
}
.post-related-head h2 { font-size: 1.25rem; font-weight: 800; }
.post-related-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 20px;
}
.pr-card {
  background: var(--c-surface); border-radius: 16px; overflow: hidden;
  border: 1.5px solid var(--c-border);
  display: flex; flex-direction: column;
  transition: transform .22s, box-shadow .22s, border-color .2s;
  cursor: pointer; text-decoration: none; color: inherit;
}
.pr-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,.1); border-color: var(--c-primary); }
.pr-card-img { height: 160px; overflow: hidden; background: var(--c-primary-dark); position: relative; }
.pr-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
.pr-card:hover .pr-card-img img { transform: scale(1.06); }
.pr-card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
.pr-card-type {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; color: var(--c-primary); margin-bottom: 6px;
}
.pr-card-title { font-size: .9rem; font-weight: 700; line-height: 1.45; margin-bottom: 8px; }
.pr-card-meta { font-size: .75rem; color: var(--c-muted); margin-top: auto; }

/* ── 404 state ── */
.post-not-found {
  max-width: 560px; margin: 80px auto; text-align: center; padding: 0 24px;
}
.post-not-found .pnf-icon { font-size: 4rem; margin-bottom: 16px; }
.post-not-found h2 { margin-bottom: 10px; }
.post-not-found p { color: var(--c-muted); margin-bottom: 28px; }

/* ── Responsive ── */
@media (max-width: 960px) {
  .post-layout { grid-template-columns: 1fr; gap: 32px; }
  .post-sidebar { position: static; }
  .post-toc { display: none; }
  .post-related-grid { grid-template-columns: repeat(2,1fr); }
  .post-hero { height: 380px; }
}
@media (max-width: 560px) {
  .post-hero { height: 300px; }
  .post-hero-title { font-size: 1.5rem; }
  .post-related-grid { grid-template-columns: 1fr; }
  .post-author { flex-direction: column; }
  .post-nav { flex-direction: column; }
  .post-nav .btn { justify-content: center; }
}

        </a>
        <a href="destinations.html" class="btn btn-primary">
          <i class="fas fa-map-marker-alt"></i> Xem địa điểm liên quan
        </a>
      </div>`;
  } else {
    /* Excerpt only (content coming soon) */
    article.innerHTML = `
      <p class="post-lead">${post.excerpt}</p>
      <div class="post-body">
        <div class="post-tip" style="margin:48px 0;">
          <div class="post-tip-icon">🔨</div>
          <div class="post-tip-body">
            <strong>Nội dung đang được cập nhật!</strong><br>
            Bài viết này đang được hoàn thiện. Hãy quay lại sau hoặc liên hệ để được tư vấn trực tiếp về ${post.dest}.
          </div>
        </div>
      </div>
      <div class="post-tags">${post.tags.map(t => `<span class="post-tag">#${t}</span>`).join('')}</div>
      <div class="post-author">
        <div class="post-author-av">${post.authorInitial}</div>
        <div>
          <div class="post-author-name">${post.author}</div>
          <div class="post-author-bio">${post.authorBio}</div>
        </div>
      </div>
      <div class="post-nav">
        <a href="blog.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Quay lại Blog</a>
        <a href="https://zalo.me/0337788044" target="_blank" class="btn btn-primary">
          <i class="fas fa-comment-dots"></i> Tư vấn qua Zalo
        </a>
      </div>`;
  }

  /* ── Destination card ── */
  if (post.dest) {
    const card = document.getElementById('postDestCard');
    card.style.display = 'block';
    document.getElementById('destCardIcon').textContent = post.destIcon || '📍';
    document.getElementById('destCardName').textContent = post.dest;
    document.getElementById('destCardAddr').textContent = post.destAddr || '';
  }

  /* ── Share ── */
  const shareUrl = encodeURIComponent(location.href);
  const shareText = encodeURIComponent(post.title + ' — Explore Quảng Trị');
  document.getElementById('shareZalo').href = `https://zalo.me/share?url=${shareUrl}&title=${shareText}`;

  /* ── TOC from h2 inside article ── */
  setTimeout(() => {
    const headings = article.querySelectorAll('h2[id]');
    const tocList  = document.getElementById('tocList');
    headings.forEach(h => {
      const li  = document.createElement('li');
      const a   = document.createElement('a');
      a.href    = '#' + h.id;
      a.textContent = h.textContent;
      a.onclick = e => {
        e.preventDefault();
        h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
      li.appendChild(a); tocList.appendChild(li);
    });

    /* Highlight active TOC item on scroll */
    if (headings.length) {
      const io = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          const link = tocList.querySelector(`a[href="#${entry.target.id}"]`);
          if (link) link.classList.toggle('active', entry.isIntersecting);
        });
      }, { rootMargin: '-80px 0px -60% 0px' });
      headings.forEach(h => io.observe(h));
    }

    /* Hide TOC if no headings */
    if (!headings.length) document.getElementById('postToc').style.display = 'none';
  }, 100);

  /* ── Related posts ── */
  const related = POSTS
    .filter(p => p.id !== post.id && (p.type === post.type || p.tags?.some(t => post.tags?.includes(t))))
    .slice(0, 3);

  const grid = document.getElementById('relatedGrid');
  if (related.length) {
    grid.innerHTML = related.map(p => `
      <a class="pr-card" href="post.html?id=${p.id}">
        <div class="pr-card-img">
          <img src="${p.img}" alt="${p.title}" loading="lazy">
        </div>
        <div class="pr-card-body">
          <div class="pr-card-type">${TYPE_LABELS[p.type] || p.type}</div>
          <div class="pr-card-title">${p.title}</div>
          <div class="pr-card-meta">
            ${p.author} · ${p.date} · ${p.readTime}
          </div>
        </div>
      </a>`).join('');
  } else {
    document.getElementById('postRelated').style.display = 'none';
  }
}

/* ── Rating breakdown builder ── */
function buildRating(p) {
  const score = p.rating || 5;
  return `
    <div class="post-rating">
      <div class="post-rating-head">
        <div class="post-rating-score">${score}.0</div>
        <div>
          <div class="post-rating-stars">${'★'.repeat(score)}</div>
          <div class="post-rating-count">Đánh giá của tác giả</div>
        </div>
      </div>
      <div class="post-rating-breakdown">
        ${p.ratingBreakdown.map(r => `
          <div class="prb-row">
            <span class="prb-label">${r.label}</span>
            <div class="prb-track">
              <div class="prb-fill" style="width:${r.val * 20}%"></div>
            </div>
            <span class="prb-val">${r.val}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

/* ── Copy link ── */
function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.querySelector('.post-share-btn:last-child');
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check" style="color:var(--c-primary);"></i> Đã sao chép!';
    setTimeout(() => btn.innerHTML = orig, 2000);
  });
}
</script>
</body>
